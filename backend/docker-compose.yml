services:
  # 1. DATABASE
  postgres:
    image: postgres:17
    container_name: phonehub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_full.sql:/docker-entrypoint-initdb.d/000_database_full.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - phonehub-net

  # 2. REDIS
  redis:
    image: redis:8
    container_name: phonehub-redis
    ports:
      - "6379:6379"
    networks:
      - phonehub-net

