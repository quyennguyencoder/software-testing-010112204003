name: CI - Postman API Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postman-api-tests:
    name: Run Postman collections
    runs-on: ubuntu-latest
    environment: secret

    defaults:
      run:
        shell: bash

    env:
      BASE_URL: http://localhost:8081
      POSTGRES_USER: phonehub
      POSTGRES_PASSWORD: phonehub_password
      POSTGRES_DB: phonehub_db
      DB_HOST: localhost
      DB_USERNAME: phonehub
      DB_PASSWORD: phonehub_password
      REDIS_HOST: localhost
      MAIL_HOST: smtp.example.com
      MAIL_PORT: "587"
      MAIL_USERNAME: ci@example.com
      MAIL_PASSWORD: dummy-password
      GOOGLE_CLIENT_ID: dummy-google-client-id
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret
      JWT_SECRET: ci_jwt_secret_key_for_phonehub_tests_which_is_long_enough
      JWT_EXPIRATION: "86400000"
      JWT_REFRESH_EXPIRATION: "604800000"
      VNPAY_URL: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      VNPAY_TMN_CODE: dummy-vnpay-code
      VNPAY_HASH_SECRET: dummy-vnpay-hash-secret
      VNPAY_RETURN_URL: http://localhost:8081/api/v1/payments/vnpay/return
      FRONTEND_URL: http://localhost:3000
      GEMINI_API_KEY: dummy-gemini-api-key
      GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta/models
      GEMINI_MODEL: gemini-1.5-flash
      GEMINI_EMBEDDING_MODEL: text-embedding-004
      API_PRODUCT_BASE_URL: http://localhost:8081/api/v1/products
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE || 'Bug' }}
      JIRA_DEFAULT_ASSIGNEE_ACCOUNT_ID: ${{ vars.JIRA_DEFAULT_ASSIGNEE_ACCOUNT_ID }}
      JIRA_ASSIGNEE_MAP_JSON: ${{ vars.JIRA_ASSIGNEE_MAP_JSON }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Start database and Redis
        working-directory: backend
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          DB_HOST=postgres
          DB_USERNAME=${POSTGRES_USER}
          DB_PASSWORD=${POSTGRES_PASSWORD}
          REDIS_HOST=redis
          EOF
          docker compose up -d postgres redis

      - name: Wait for database
        run: |
          for i in {1..30}; do
            if docker exec phonehub-postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f backend/docker-compose.yml logs postgres
          exit 1

      - name: Build backend
        working-directory: backend
        run: mvn clean package -B -DskipTests

      - name: Start backend
        working-directory: backend
        run: |
          nohup java -jar target/*.jar > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS "$BASE_URL/api/v1/health"; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy"
          tail -n 200 backend.log || true
          exit 1

      - name: Prepare Postman reports
        run: mkdir -p postman_tests/reports

      - name: Run Postman collections
        id: newman
        continue-on-error: true
        run: |
          set +e
          FAILED=0
          for collection in postman_tests/*.postman_collection.json; do
            name="$(basename "$collection" .postman_collection.json)"
            echo "Running $name"
            newman run "$collection" \
              --environment postman_tests/phonehub_local.postman_environment.json \
              --env-var "baseUrl=$BASE_URL" \
              --reporters cli,json,junit,htmlextra \
              --reporter-json-export "postman_tests/reports/${name}.json" \
              --reporter-junit-export "postman_tests/reports/${name}.xml" \
              --reporter-htmlextra-export "postman_tests/reports/${name}.html"
            status=$?
            if [ "$status" -ne 0 ]; then
              FAILED=1
            fi
          done
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          exit "$FAILED"

      - name: Upload Postman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-reports
          path: |
            postman_tests/reports
            backend.log
          if-no-files-found: ignore

      - name: Create Jira issue on Postman failure
        if: steps.newman.outputs.failed == '1' && env.JIRA_BASE_URL != '' && env.JIRA_EMAIL != '' && env.JIRA_API_TOKEN != '' && env.JIRA_PROJECT_KEY != '' && env.JIRA_DEFAULT_ASSIGNEE_ACCOUNT_ID != ''
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const reportsDir = 'postman_tests/reports';
          const failedCollections = [];
          const assigneeMap = parseAssigneeMap(process.env.JIRA_ASSIGNEE_MAP_JSON);

          for (const file of fs.readdirSync(reportsDir).filter((f) => f.endsWith('.json'))) {
            const report = JSON.parse(fs.readFileSync(path.join(reportsDir, file), 'utf8'));
            const failures = report.run?.failures || [];
            if (failures.length > 0) {
              failedCollections.push({
                collection: file.replace(/\.json$/, ''),
                failures: failures.slice(0, 10).map((failure) => ({
                  name: failure.source?.name || failure.parent?.name || 'Unknown request',
                  error: failure.error?.message || 'Unknown error',
                })),
              });
            }
          }

          const groups = groupByAssignee(failedCollections, assigneeMap);

          groups.forEach((group, index) => {
            const summary = group.collections.length
              ? group.collections.map((c) => {
                  const details = c.failures.map((f) => `- ${f.name}: ${f.error}`).join('\n');
                  return `Collection ${c.collection}\n${details}`;
                }).join('\n\n')
              : 'Newman exited with failure. Check GitHub Actions artifacts for details.';

            const collectionNames = group.collections.map((c) => c.collection).join(', ') || 'unknown collection';
            const payload = {
              fields: {
                project: { key: process.env.JIRA_PROJECT_KEY },
                summary: `[CI] Postman API tests failed - ${collectionNames}`,
                description: {
                  type: 'doc',
                  version: 1,
                  content: [
                    {
                      type: 'paragraph',
                      content: [
                        {
                          type: 'text',
                          text: `Postman API tests failed in GitHub Actions run ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
                        },
                      ],
                    },
                    {
                      type: 'paragraph',
                      content: [
                        {
                          type: 'text',
                          text: group.assignee
                            ? `Assigned by collection ownership map to Jira accountId ${group.assignee}.`
                            : 'No Jira assignee matched this failing collection. Configure JIRA_ASSIGNEE_MAP_JSON or JIRA_DEFAULT_ASSIGNEE_ACCOUNT_ID.',
                        },
                      ],
                    },
                    {
                      type: 'codeBlock',
                      attrs: { language: 'text' },
                      content: [{ type: 'text', text: summary }],
                    },
                  ],
                },
                issuetype: { name: process.env.JIRA_ISSUE_TYPE || 'Bug' },
              },
            };

            if (group.assignee) {
              payload.fields.assignee = { accountId: group.assignee };
            }

            fs.writeFileSync(`jira-payload-${index + 1}.json`, JSON.stringify(payload));
          });

          function parseAssigneeMap(raw) {
            if (!raw || !raw.trim()) return {};
            try {
              return JSON.parse(raw);
            } catch (error) {
              throw new Error(`JIRA_ASSIGNEE_MAP_JSON is not valid JSON: ${error.message}`);
            }
          }

          function resolveAssignee(collection, map) {
            const withoutNumber = collection.replace(/^\d+_/, '');
            const prefix = collection.split('_')[0];
            return (
              map[collection] ||
              map[withoutNumber] ||
              map[prefix] ||
              process.env.JIRA_DEFAULT_ASSIGNEE_ACCOUNT_ID ||
              ''
            );
          }

          function groupByAssignee(collections, map) {
            const fallback = collections.length ? collections : [{ collection: 'newman', failures: [] }];
            const grouped = new Map();

            for (const collection of fallback) {
              const assignee = resolveAssignee(collection.collection, map);
              const key = assignee || 'UNASSIGNED';
              if (!grouped.has(key)) {
                grouped.set(key, { assignee, collections: [] });
              }
              grouped.get(key).collections.push(collection);
            }

            return [...grouped.values()];
          }
          NODE

#          for payload in jira-payload-*.json; do
#            curl --fail --show-error --silent \
#              --request POST \
#              --url "${JIRA_BASE_URL%/}/rest/api/3/issue" \
#              --user "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
#              --header "Accept: application/json" \
#              --header "Content-Type: application/json" \
#              --data @"$payload"
#          done

          for payload in jira-payload-*.json; do
            echo "Đang gửi payload:"
            cat "$payload"
            RESPONSE=$(curl --write-out "%{http_code}" --silent --output response.txt \
              --request POST \
              --url "${JIRA_BASE_URL%/}/rest/api/3/issue" \
              --user "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              --header "Accept: application/json" \
              --header "Content-Type: application/json" \
              --data @"$payload")
          
            if [ "$RESPONSE" -ne 201 ]; then
              echo "Lỗi khi tạo issue (HTTP $RESPONSE):"
              cat response.txt
              exit 1
            fi
          done

      - name: Fail workflow when Postman failed
        if: steps.newman.outputs.failed == '1'
        run: exit 1

      - name: Show backend logs on failure
        if: failure()
        run: tail -n 200 backend.log || true


