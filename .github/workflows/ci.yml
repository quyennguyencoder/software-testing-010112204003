name: CI - Postman API Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-postman-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: http://localhost:8081
  POSTGRES_USER: phonehub
  POSTGRES_PASSWORD: phonehub
  POSTGRES_DB: phonehub
  DB_HOST: localhost
  DB_USERNAME: phonehub
  DB_PASSWORD: phonehub
  REDIS_HOST: localhost
  MAIL_HOST: smtp.example.com
  MAIL_PORT: "587"
  MAIL_USERNAME: ci@example.com
  MAIL_PASSWORD: dummy-password
  GOOGLE_CLIENT_ID: dummy-google-client-id
  GOOGLE_CLIENT_SECRET: dummy-google-client-secret
  JWT_SECRET: ci_jwt_secret_key_for_phonehub_tests_which_is_long_enough
  JWT_EXPIRATION: "86400000"
  JWT_REFRESH_EXPIRATION: "604800000"
  VNPAY_URL: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  VNPAY_TMN_CODE: dummy-vnpay-code
  VNPAY_HASH_SECRET: dummy-vnpay-hash-secret
  VNPAY_RETURN_URL: http://localhost:8081/api/v1/payments/vnpay/return
  FRONTEND_URL: http://localhost:3000
  GEMINI_API_KEY: dummy-gemini-api-key
  GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta/models
  GEMINI_MODEL: gemini-1.5-flash
  GEMINI_EMBEDDING_MODEL: text-embedding-004
  API_PRODUCT_BASE_URL: http://localhost:8081/api/v1/products

jobs:
#  backend-tests:
#    name: Backend unit tests
#    runs-on: ubuntu-latest
#
#    steps:
#      - name: Checkout source
#        uses: actions/checkout@v4
#
#      - name: Set up Java 17
#        uses: actions/setup-java@v4
#        with:
#          distribution: temurin
#          java-version: "17"
#          cache: maven
#
#      - name: Run Maven tests
#        working-directory: backend
#        run: mvn test -B

  run-collections:
    name: Postman [${{ matrix.member }}] ${{ matrix.collection }}
#    needs: backend-tests
    runs-on: ubuntu-latest
    environment: secret

    strategy:
      fail-fast: false
      matrix:
        include:
          - member: "Leader"
            collection: "01_Leader_Auth_User_WithTests"
            jira_assignee_env: JIRA_ASSIGNEE_LEADER
          - member: "Member-2"
            collection: "02_Member_ProductView"
            jira_assignee_env: JIRA_ASSIGNEE_MEMBER2
          - member: "Member-3"
            collection: "03_Member_AdminProduct"
            jira_assignee_env: JIRA_ASSIGNEE_MEMBER3
          - member: "Member-4"
            collection: "04_Member_Order"
            jira_assignee_env: JIRA_ASSIGNEE_MEMBER4
          - member: "Member-5"
            collection: "05_Member_Cart_Address"
            jira_assignee_env: JIRA_ASSIGNEE_MEMBER5
          - member: "Member-6"
            collection: "06_Member_AdminOrder_Dashboard"
            jira_assignee_env: JIRA_ASSIGNEE_MEMBER6
          - member: "Member-7"
            collection: "07_Member_Promotion_Payment_Chatbot"
            jira_assignee_env: JIRA_ASSIGNEE_MEMBER7

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE || 'Bug' }}
      JIRA_ASSIGNEE_LEADER: ${{ vars.JIRA_ASSIGNEE_LEADER }}
      JIRA_ASSIGNEE_MEMBER2: ${{ vars.JIRA_ASSIGNEE_MEMBER2 }}
      JIRA_ASSIGNEE_MEMBER3: ${{ vars.JIRA_ASSIGNEE_MEMBER3 }}
      JIRA_ASSIGNEE_MEMBER4: ${{ vars.JIRA_ASSIGNEE_MEMBER4 }}
      JIRA_ASSIGNEE_MEMBER5: ${{ vars.JIRA_ASSIGNEE_MEMBER5 }}
      JIRA_ASSIGNEE_MEMBER6: ${{ vars.JIRA_ASSIGNEE_MEMBER6 }}
      JIRA_ASSIGNEE_MEMBER7: ${{ vars.JIRA_ASSIGNEE_MEMBER7 }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: |
          if [ -f postman_tests/package-lock.json ]; then
            npm ci --prefix postman_tests
          else
            npm install -g newman@6 newman-reporter-htmlextra@1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Prepare report directory
        run: mkdir -p postman_tests/reports

      - name: Start Postgres and Redis
        working-directory: backend
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          DB_HOST=postgres
          DB_USERNAME=${POSTGRES_USER}
          DB_PASSWORD=${POSTGRES_PASSWORD}
          REDIS_HOST=redis
          EOF
          docker compose up -d postgres redis

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker exec phonehub-postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f backend/docker-compose.yml logs postgres
          exit 1

      - name: Seed database if SQL dump exists
        run: |
          if [ -f backend/database_full.sql ]; then
            docker exec -i phonehub-postgres psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" < backend/database_full.sql
          else
            echo "backend/database_full.sql not found; continuing without seed data."
          fi

      - name: Build backend package
        working-directory: backend
        run: mvn clean package -B -DskipTests

      - name: Start backend server
        working-directory: backend
        run: |
          nohup java -jar target/*.jar > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS "$BASE_URL/api/v1/health"; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy"
          tail -n 200 backend.log || true
          exit 1

      - name: Run Newman - ${{ matrix.member }} / ${{ matrix.collection }}
        id: newman
        continue-on-error: true
        run: |
          NEWMAN_BIN="newman"
          if [ -x postman_tests/node_modules/.bin/newman ]; then
            NEWMAN_BIN="postman_tests/node_modules/.bin/newman"
          fi

          "$NEWMAN_BIN" run \
            "postman_tests/${{ matrix.collection }}.postman_collection.json" \
            --environment postman_tests/phonehub_local.postman_environment.json \
            --env-var "baseUrl=$BASE_URL" \
            --reporters cli,json,junit,htmlextra \
            --reporter-json-export "postman_tests/reports/${{ matrix.collection }}.json" \
            --reporter-junit-export "postman_tests/reports/${{ matrix.collection }}.xml" \
            --reporter-htmlextra-export "postman_tests/reports/${{ matrix.collection }}.html" \
          && echo "status=passed" >> "$GITHUB_OUTPUT" \
          || echo "status=failed" >> "$GITHUB_OUTPUT"

      - name: Upload report - ${{ matrix.member }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.member }}
          path: |
            postman_tests/reports/${{ matrix.collection }}.*
            backend.log
          if-no-files-found: ignore

      - name: Create Jira issues for new failed requests
        if: >
          steps.newman.outputs.status == 'failed' &&
          github.event_name == 'push' &&
          env.JIRA_BASE_URL != '' &&
          env.JIRA_EMAIL != '' &&
          env.JIRA_API_TOKEN != '' &&
          env.JIRA_PROJECT_KEY != ''
        env:
          ASSIGNEE_ACCOUNT_ID: ${{ env[matrix.jira_assignee_env] }}
          COLLECTION_NAME: ${{ matrix.collection }}
          MEMBER_NAME: ${{ matrix.member }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node --input-type=commonjs <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const jiraBaseUrl = process.env.JIRA_BASE_URL.replace(/\/$/, '');
          const auth = Buffer.from(`${process.env.JIRA_EMAIL}:${process.env.JIRA_API_TOKEN}`).toString('base64');
          const collection = process.env.COLLECTION_NAME;
          const member = process.env.MEMBER_NAME;
          const assigneeId = process.env.ASSIGNEE_ACCOUNT_ID || '';
          const runUrl = process.env.GH_RUN_URL;
          const reportFile = path.join('postman_tests', 'reports', `${collection}.json`);

          function sanitizeLabel(value) {
            return String(value)
              .toLowerCase()
              .replace(/[^a-z0-9_-]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 255);
          }

          function getTestCaseId(requestName) {
            const match = String(requestName || '').match(/^([A-Z]+[0-9]+)/);
            return match ? match[1] : 'unknown';
          }

          async function jiraFetch(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: {
                Accept: 'application/json',
                Authorization: `Basic ${auth}`,
                ...(options.headers || {})
              }
            });
            const text = await response.text();
            let body = null;
            try { body = text ? JSON.parse(text) : null; } catch { body = text; }
            if (!response.ok) throw new Error(`Jira HTTP ${response.status}: ${text}`);
            return body;
          }

          function bulletItem(text) {
            return {
              type: 'listItem',
              content: [{ type: 'paragraph', content: [{ type: 'text', text }] }]
            };
          }

          function buildDescription(requestName, errors) {
            const failureSummary = errors
              .slice(0, 15)
              .map((error, index) => `${index + 1}. ${error}`)
              .join('\n');

            return {
              type: 'doc', version: 1,
              content: [
                { type: 'heading', attrs: { level: 3 }, content: [{ type: 'text', text: 'Postman API test failure' }] },
                {
                  type: 'bulletList',
                  content: [
                    bulletItem(`Request: ${requestName}`),
                    bulletItem(`Collection: ${collection}`),
                    bulletItem(`Owner: ${member}`),
                    bulletItem(`CI run: ${runUrl}`)
                  ]
                },
                { type: 'heading', attrs: { level: 4 }, content: [{ type: 'text', text: 'Failure details' }] },
                { type: 'codeBlock', attrs: { language: 'text' }, content: [{ type: 'text', text: failureSummary || 'No failure details found in Newman report.' }] },
                { type: 'paragraph', content: [{ type: 'text', text: 'Download the full HTML report from the CI run artifacts.' }] }
              ]
            };
          }

          if (!fs.existsSync(reportFile)) throw new Error(`Newman report not found: ${reportFile}`);

          const report = JSON.parse(fs.readFileSync(reportFile, 'utf8'));
          const failures = report.run?.failures || [];
          const byRequest = new Map();

          for (const failure of failures) {
            const requestName = failure.parent?.name || failure.source?.name || 'Unknown request';
            const assertionName = failure.source?.name || 'Unknown assertion';
            const message = `${assertionName}: ${failure.error?.message || failure.error?.name || 'Unknown error'}`;
            if (!byRequest.has(requestName)) byRequest.set(requestName, []);
            byRequest.get(requestName).push(message);
          }

          if (byRequest.size === 0) {
            byRequest.set(`${collection} - Newman failed without request-level failures`, [
              'Newman returned a non-zero exit code, but no specific request failure was found.'
            ]);
          }

          for (const [requestName, errors] of byRequest.entries()) {
            const testCaseId = getTestCaseId(requestName);
            const testCaseLabel = sanitizeLabel(`tc-${testCaseId}`);
            const collectionLabel = sanitizeLabel(`collection-${collection}`);
            const jql = `project = ${process.env.JIRA_PROJECT_KEY} AND labels = "postman-ci" AND labels = "${testCaseLabel}" AND labels = "${collectionLabel}" AND statusCategory != Done`;
            const searchUrl = `${jiraBaseUrl}/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=1&fields=key,summary`;
            const existing = await jiraFetch(searchUrl);

            if ((existing.issues || []).length > 0) {
              const issue = existing.issues[0];
              console.log(`Existing Jira issue found for ${requestName}: ${issue.key}. Skip creating duplicate.`);
              continue;
            }

            const payload = {
              fields: {
                project: { key: process.env.JIRA_PROJECT_KEY },
                issuetype: { name: process.env.JIRA_ISSUE_TYPE || 'Bug' },
                summary: `[CI] ${requestName} failed - ${collection}`,
                description: buildDescription(requestName, errors),
                labels: ['postman-ci', testCaseLabel, collectionLabel]
              }
            };
            if (assigneeId) payload.fields.assignee = { accountId: assigneeId };

            const created = await jiraFetch(`${jiraBaseUrl}/rest/api/3/issue`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            console.log(`Created Jira issue ${created.key} for ${requestName}`);
          }
          NODE

      - name: Fail job if tests failed
        if: steps.newman.outputs.status == 'failed'
        run: |
          echo "Collection ${{ matrix.collection }} (${{ matrix.member }}) has failed tests."
          exit 1

      - name: Show backend logs on failure
        if: failure()
        run: tail -n 200 backend.log || true

  summary:
    name: Test summary
    needs: run-collections
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Print summary table
        run: |
          echo "## Postman API Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Member | Collection | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------------|--------|" >> "$GITHUB_STEP_SUMMARY"

          declare -A MEMBERS=(
            ["01_Leader_Auth_User_WithTests"]="Leader"
            ["02_Member_ProductView"]="Member 2"
            ["03_Member_AdminProduct"]="Member 3"
            ["04_Member_Order"]="Member 4"
            ["05_Member_Cart_Address"]="Member 5"
            ["06_Member_AdminOrder_Dashboard"]="Member 6"
            ["07_Member_Promotion_Payment_Chatbot"]="Member 7"
          )

          for col in "${!MEMBERS[@]}"; do
            member="${MEMBERS[$col]}"
            xml_file=$(find all-reports -name "${col}.xml" 2>/dev/null | head -1)
            if [ -z "$xml_file" ]; then
              status="No report"
            elif grep -q 'failures="[1-9]' "$xml_file" || grep -q 'errors="[1-9]' "$xml_file"; then
              status="FAILED"
            else
              status="PASSED"
            fi
            echo "| $member | \`$col\` | $status |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download full HTML reports from this CI run's Artifacts section." >> "$GITHUB_STEP_SUMMARY"



